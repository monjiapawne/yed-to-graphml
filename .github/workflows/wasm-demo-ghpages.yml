name: Compile to WASM & deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build WASM
        run: GOOS=js GOARCH=wasm go build -o web/main.wasm ./web

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        uses: actions/deploy-pages@v4
